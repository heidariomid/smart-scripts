<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Transcript Agents</title>
    <style>
      :root {
        --bg: #121314;
        --panel: #181b22;
        --border: #3f3c41;
        --fg: #e6e9ef;
        --muted: #9aa3b2;
        --accent: #ed6b0e;
        --ok: #4ade80;
        --err: #f54f4f;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font:
          15px/1.5 -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: var(--bg);
        color: var(--fg);
        padding: 32px 16px;
      }
      .wrap {
        max-width: 820px;
        margin: 0 auto;
      }
      h1 {
        font-size: 22px;
        margin: 0 0 4px;
      }
      .sub {
        color: var(--muted);
        margin: 0 0 24px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
      }
      #drop {
        border: 2px dashed var(--border);
        border-radius: 12px;
        padding: 28px;
        text-align: center;
        color: var(--muted);
        transition: 0.15s;
        user-select: none;
        cursor: pointer;
      }
      #drop.over {
        border-color: var(--accent);
        color: var(--fg);
        background: rgba(124, 156, 255, 0.06);
      }
      #drop strong {
        color: var(--fg);
      }
      .file {
        margin-top: 10px;
        color: var(--fg);
        font-size: 14px;
      }
      label {
        display: block;
        font-size: 13px;
        color: var(--muted);
        margin: 16px 0 6px;
      }
      select,
      button {
        font: inherit;
        color: var(--fg);
        background: #20242d;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        width: 100%;
      }
      .row {
        display: flex;
        gap: 12px;
      }
      .row > div {
        flex: 1;
      }
      .desc {
        color: var(--muted);
        font-size: 13px;
        min-height: 18px;
        margin-top: 6px;
      }
      button.run {
        margin-top: 18px;
        background: var(--accent);
        color: #0b0e14;
        border: none;
        font-weight: 600;
        cursor: pointer;
      }
      button.run:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .status {
        margin-top: 14px;
        font-size: 14px;
        min-height: 20px;
      }
      .status.ok {
        color: var(--ok);
      }
      .status.err {
        color: var(--err);
      }
      .result {
        display: none;
      }
      .result h2 {
        font-size: 14px;
        margin: 0 0 8px;
        font-family: ui-monospace, Menlo, monospace;
        word-break: break-all;
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .actions a {
        text-decoration: none;
      }
      .actions a button {
        width: auto;
        padding: 8px 14px;
      }
      pre {
        background: #0b0e14;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px;
        overflow: auto;
        max-height: 460px;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 13px;
        margin: 0;
      }
      .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid var(--muted);
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        vertical-align: -2px;
        margin-right: 6px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Transcript Agents</h1>
      <p class="sub">
        Drop or pick a transcript, choose an agent, and run. Output is saved to your Desktop and shown below to
        download.
      </p>

      <div class="panel">
        <div id="drop">
          <strong>Drop a file here, or click to choose</strong>
          <span id="exts" style="display: block; font-size: 13px; margin-top: 4px"></span>
          <div class="file" id="fileName"></div>
        </div>
        <input type="file" id="fileInput" hidden />

        <div class="row">
          <div>
            <label for="mode">Agent</label>
            <select id="mode"></select>
          </div>
          <div>
            <label for="model">Model</label>
            <select id="model"></select>
          </div>
        </div>
        <div class="desc" id="modeDesc"></div>

        <button class="run" id="runBtn" disabled>Run</button>
        <div class="status" id="status"></div>
      </div>

      <div class="panel result" id="result">
        <h2 id="resultTitle"></h2>
        <div class="actions" id="actions"></div>
        <pre id="output"></pre>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      let modes = [],
        models = [],
        selectedFile = null;

      const drop = $("drop"),
        fileInput = $("fileInput"),
        fileName = $("fileName");
      const modeSel = $("mode"),
        modelSel = $("model"),
        modeDesc = $("modeDesc");
      const runBtn = $("runBtn"),
        statusEl = $("status");
      const result = $("result"),
        output = $("output"),
        actions = $("actions");

      function setFile(f) {
        selectedFile = f;
        fileName.textContent = f ? "Selected: " + f.name : "";
        updateRun();
      }
      function updateRun() {
        runBtn.disabled = !(selectedFile && modeSel.value);
      }

      drop.addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", () => {
        if (fileInput.files[0]) setFile(fileInput.files[0]);
      });
      ["dragenter", "dragover"].forEach((ev) =>
        drop.addEventListener(ev, (e) => {
          e.preventDefault();
          drop.classList.add("over");
        })
      );
      ["dragleave", "drop"].forEach((ev) =>
        drop.addEventListener(ev, (e) => {
          e.preventDefault();
          drop.classList.remove("over");
        })
      );
      drop.addEventListener("drop", (e) => {
        if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
      });

      modeSel.addEventListener("change", () => {
        const m = modes.find((x) => x.name === modeSel.value);
        modeDesc.textContent = m ? m.description : "";
        updateRun();
      });

      async function loadConfig() {
        try {
          const res = await fetch("/api/config");
          const data = await res.json();
          modes = data.modes || [];
          models = data.models || [];
          $("exts").textContent = (data.sourceExts || []).join(" · ");
          modeSel.innerHTML = "";
          for (const m of modes) {
            const o = document.createElement("option");
            o.value = m.name;
            o.textContent = m.name;
            o.title = m.description;
            modeSel.appendChild(o);
          }
          modelSel.innerHTML = "";
          for (const m of models) {
            const o = document.createElement("option");
            o.value = m.alias;
            o.textContent = m.label;
            modelSel.appendChild(o);
          }
          modeSel.dispatchEvent(new Event("change"));
        } catch (e) {
          statusEl.className = "status err";
          statusEl.textContent = "Could not load config: " + e;
        }
      }

      runBtn.addEventListener("click", async () => {
        if (!selectedFile || !modeSel.value) return;
        runBtn.disabled = true;
        result.style.display = "none";
        statusEl.className = "status";
        statusEl.innerHTML = '<span class="spinner"></span>Running ' + modeSel.value + "… (can take a minute or two)";

        const fd = new FormData();
        fd.append("mode", modeSel.value);
        fd.append("model", modelSel.value);
        fd.append("file", selectedFile);

        try {
          const res = await fetch("/api/process", { method: "POST", body: fd });
          const data = await res.json();
          if (!res.ok || !data.ok) throw new Error(data.error || "HTTP " + res.status);

          statusEl.className = "status ok";
          statusEl.textContent = "Saved to " + data.outputPath;

          $("resultTitle").textContent = data.outputPath;
          output.textContent = data.content;

          actions.innerHTML = "";
          const blob = new Blob([data.content], { type: data.isHtml ? "text/html" : "text/markdown" });
          const url = URL.createObjectURL(blob);
          const dl = document.createElement("a");
          dl.href = url;
          dl.download = data.outputPath.split("/").pop();
          dl.innerHTML = "<button>Download</button>";
          actions.appendChild(dl);
          if (data.isHtml) {
            const op = document.createElement("a");
            op.href = url;
            op.target = "_blank";
            op.innerHTML = "<button>Open in new tab</button>";
            actions.appendChild(op);
          }
          result.style.display = "block";
        } catch (e) {
          statusEl.className = "status err";
          statusEl.textContent = "Error: " + e.message;
        } finally {
          updateRun();
        }
      });

      loadConfig();
    </script>
  </body>
</html>
