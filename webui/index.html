<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Transcript Agents</title>
    <style>
      :root {
        --bg: #121314;
        --panel: #181b22;
        --border: #3f3c41;
        --fg: #e6e9ef;
        --muted: #9aa3b2;
        --accent: #ed6b0e;
        --ok: #4ade80;
        --err: #f54f4f;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font:
          15px/1.5 -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: var(--bg);
        color: var(--fg);
        padding: 32px 16px;
      }
      .wrap {
        max-width: 820px;
        margin: 0 auto;
      }
      h1 {
        font-size: 22px;
        margin: 0 0 4px;
      }
      .sub {
        color: var(--muted);
        margin: 0 0 24px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
      }
      #drop {
        border: 2px dashed var(--border);
        border-radius: 12px;
        padding: 28px;
        text-align: center;
        color: var(--muted);
        transition: 0.15s;
        user-select: none;
        cursor: pointer;
      }
      #drop.over {
        border-color: var(--accent);
        color: var(--fg);
        background: rgba(124, 156, 255, 0.06);
      }
      #drop strong {
        color: var(--fg);
      }
      .file {
        margin-top: 10px;
        color: var(--fg);
        font-size: 14px;
      }
      label {
        display: block;
        font-size: 13px;
        color: var(--muted);
        margin: 16px 0 6px;
      }
      select,
      textarea,
      button {
        font: inherit;
        color: var(--fg);
        background: #20242d;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        width: 100%;
      }
      textarea {
        resize: vertical;
        min-height: 64px;
        line-height: 1.5;
      }
      textarea::placeholder {
        color: var(--muted);
      }
      .row {
        display: flex;
        gap: 12px;
      }
      .row > div {
        flex: 1;
      }
      .desc {
        color: var(--muted);
        font-size: 13px;
        min-height: 18px;
        margin-top: 6px;
      }
      .agentsHead {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
      }
      .linkbtn {
        width: auto;
        background: none;
        border: none;
        color: var(--accent);
        padding: 0;
        font-size: 13px;
        cursor: pointer;
      }
      .agentList {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .agentList label.chip {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0;
        padding: 9px 11px;
        background: #20242d;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--fg);
        font-size: 14px;
        cursor: pointer;
        transition: 0.12s;
      }
      .agentList label.chip:hover {
        border-color: var(--muted);
      }
      .agentList label.chip.on {
        border-color: var(--accent);
        background: rgba(237, 107, 14, 0.08);
      }
      .agentList input {
        width: auto;
        accent-color: var(--accent);
        margin: 0;
      }
      @media (max-width: 560px) {
        .agentList {
          grid-template-columns: 1fr;
        }
      }
      button.run {
        margin-top: 18px;
        background: var(--accent);
        color: #0b0e14;
        border: none;
        font-weight: 600;
        cursor: pointer;
      }
      button.run:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .status {
        margin-top: 14px;
        font-size: 14px;
        min-height: 20px;
      }
      .status.ok {
        color: var(--ok);
      }
      .status.err {
        color: var(--err);
      }
      .result {
        display: none;
      }
      .result h2 {
        font-size: 14px;
        margin: 0 0 8px;
        font-family: ui-monospace, Menlo, monospace;
        word-break: break-all;
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .actions a {
        text-decoration: none;
      }
      .actions a button {
        width: auto;
        padding: 8px 14px;
      }
      pre {
        background: #0b0e14;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px;
        overflow: auto;
        max-height: 460px;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 13px;
        margin: 0;
      }
      .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid var(--muted);
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        vertical-align: -2px;
        margin-right: 6px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Transcript Agents</h1>
      <p class="sub">
        Drop or pick a transcript, choose an agent, and run. Output is saved to your Desktop and shown below to
        download.
      </p>

      <div class="panel">
        <div id="drop">
          <strong>Drop a file here, or click to choose</strong>
          <span id="exts" style="display: block; font-size: 13px; margin-top: 4px"></span>
          <div class="file" id="fileName"></div>
        </div>
        <input type="file" id="fileInput" hidden />

        <div class="agentsHead">
          <label style="margin: 16px 0 6px">Agents <span style="opacity: 0.6">(pick one or more)</span></label>
          <button type="button" class="linkbtn" id="toggleAll">Select all</button>
        </div>
        <div class="agentList" id="agentList"></div>

        <div class="row">
          <div>
            <label for="model">Model</label>
            <select id="model"></select>
          </div>
          <div>
            <label for="effort">Effort</label>
            <select id="effort"></select>
          </div>
        </div>

        <label for="extra">Extra instructions <span style="opacity: 0.6">(optional)</span></label>
        <textarea
          id="extra"
          rows="3"
          maxlength="4000"
          placeholder="Add anything to steer the output — tone, focus, length, sections to emphasize, things to skip… Appended to the agent's prompt and takes priority where it conflicts."
        ></textarea>

        <button class="run" id="runBtn" disabled>Run</button>
        <div class="status" id="status"></div>
      </div>

      <div id="results"></div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      let modes = [],
        models = [],
        efforts = [],
        selectedFile = null;

      const drop = $("drop"),
        fileInput = $("fileInput"),
        fileName = $("fileName");
      const agentList = $("agentList"),
        toggleAll = $("toggleAll"),
        modelSel = $("model"),
        effortSel = $("effort"),
        extraEl = $("extra");
      const runBtn = $("runBtn"),
        statusEl = $("status");
      const resultsEl = $("results");

      const checkedModes = () => [...agentList.querySelectorAll("input:checked")].map((i) => i.value);

      function setFile(f) {
        selectedFile = f;
        fileName.textContent = f ? "Selected: " + f.name : "";
        updateRun();
      }
      function updateRun() {
        const n = checkedModes().length;
        runBtn.disabled = !(selectedFile && n);
        runBtn.textContent = n > 1 ? `Run ${n} agents` : "Run";
        const total = agentList.querySelectorAll("input").length;
        toggleAll.textContent = n === total && total ? "Select none" : "Select all";
      }

      drop.addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", () => {
        if (fileInput.files[0]) setFile(fileInput.files[0]);
      });
      ["dragenter", "dragover"].forEach((ev) =>
        drop.addEventListener(ev, (e) => {
          e.preventDefault();
          drop.classList.add("over");
        })
      );
      ["dragleave", "drop"].forEach((ev) =>
        drop.addEventListener(ev, (e) => {
          e.preventDefault();
          drop.classList.remove("over");
        })
      );
      drop.addEventListener("drop", (e) => {
        if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
      });

      toggleAll.addEventListener("click", () => {
        const boxes = [...agentList.querySelectorAll("input")];
        const turnOn = checkedModes().length !== boxes.length;
        boxes.forEach((b) => {
          b.checked = turnOn;
          b.closest("label").classList.toggle("on", turnOn);
        });
        updateRun();
      });

      async function loadConfig() {
        try {
          const res = await fetch("/api/config");
          const data = await res.json();
          modes = data.modes || [];
          models = data.models || [];
          efforts = data.efforts || [];
          $("exts").textContent = (data.sourceExts || []).join(" · ");
          agentList.innerHTML = "";
          for (const m of modes) {
            const lab = document.createElement("label");
            lab.className = "chip";
            lab.title = m.description;
            const cb = document.createElement("input");
            cb.type = "checkbox";
            cb.value = m.name;
            cb.addEventListener("change", () => {
              lab.classList.toggle("on", cb.checked);
              updateRun();
            });
            lab.appendChild(cb);
            lab.appendChild(document.createTextNode(m.name));
            agentList.appendChild(lab);
          }
          modelSel.innerHTML = "";
          for (const m of models) {
            const o = document.createElement("option");
            o.value = m.alias;
            o.textContent = m.label;
            modelSel.appendChild(o);
          }
          effortSel.innerHTML = "";
          for (const e of efforts) {
            const o = document.createElement("option");
            o.value = e.alias;
            o.textContent = e.label;
            effortSel.appendChild(o);
          }
          updateRun();
        } catch (e) {
          statusEl.className = "status err";
          statusEl.textContent = "Could not load config: " + e;
        }
      }

      function renderResult(r) {
        const panel = document.createElement("div");
        panel.className = "panel";
        const h2 = document.createElement("h2");
        const actions = document.createElement("div");
        actions.className = "actions";
        const pre = document.createElement("pre");

        if (r.ok) {
          h2.textContent = r.outputPath;
          pre.textContent = r.content;
          const blob = new Blob([r.content], { type: r.isHtml ? "text/html" : "text/markdown" });
          const url = URL.createObjectURL(blob);
          const dl = document.createElement("a");
          dl.href = url;
          dl.download = r.outputPath.split("/").pop();
          dl.innerHTML = "<button>Download</button>";
          actions.appendChild(dl);
          if (r.isHtml) {
            const op = document.createElement("a");
            op.href = url;
            op.target = "_blank";
            op.innerHTML = "<button>Open in new tab</button>";
            actions.appendChild(op);
          }
        } else {
          h2.textContent = r.mode + " — failed";
          h2.style.color = "var(--err)";
          pre.textContent = r.error || "Unknown error";
        }
        panel.appendChild(h2);
        panel.appendChild(actions);
        panel.appendChild(pre);
        resultsEl.appendChild(panel);
      }

      runBtn.addEventListener("click", async () => {
        const picked = checkedModes();
        if (!selectedFile || !picked.length) return;
        runBtn.disabled = true;
        resultsEl.innerHTML = "";
        statusEl.className = "status";
        statusEl.innerHTML =
          '<span class="spinner"></span>Running ' +
          (picked.length > 1 ? picked.length + " agents" : picked[0]) +
          "… (can take a minute or two)";

        const fd = new FormData();
        fd.append("modes", picked.join(","));
        fd.append("model", modelSel.value);
        fd.append("effort", effortSel.value);
        fd.append("extra", extraEl.value);
        fd.append("file", selectedFile);

        try {
          const res = await fetch("/api/process", { method: "POST", body: fd });
          const data = await res.json();
          if (!data.results) throw new Error(data.error || "HTTP " + res.status);

          for (const r of data.results) renderResult(r);

          const okCount = data.results.filter((r) => r.ok).length;
          const failCount = data.results.length - okCount;
          statusEl.className = failCount ? "status err" : "status ok";
          statusEl.textContent =
            (okCount ? `Saved ${okCount} file${okCount > 1 ? "s" : ""} to Desktop` : "All agents failed") +
            (failCount ? ` · ${failCount} failed` : "");
        } catch (e) {
          statusEl.className = "status err";
          statusEl.textContent = "Error: " + e.message;
        } finally {
          updateRun();
        }
      });

      loadConfig();
    </script>
  </body>
</html>
